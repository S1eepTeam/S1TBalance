<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WES</title>
    <style>
        /* Сброс отступов и базовые настройки */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0f1a2f 0%, #1a2a3f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            position: relative;
            overflow-x: hidden;
        }

        /* Декоративный элемент */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(150, 200, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Основной контейнер */
        .container {
            text-align: center;
            z-index: 10;
            padding: 2rem;
        }

        /* Стилизация надписи Всё хорошо */
        .message {
            font-size: clamp(3rem, 15vw, 8rem);
            font-weight: 800;
            letter-spacing: 0.1em;
            color: #ffffff;
            text-shadow: 
                0 0 20px rgba(0, 200, 255, 0.5),
                0 0 40px rgba(100, 150, 255, 0.4);
            animation: fadeIn 2s ease;
            background: linear-gradient(135deg, #e0f0ff, #b0d0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            margin-bottom: 2rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Кнопка возврата на главную */
        .back-button {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.8rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        /* Декоративные звездочки */
        .glow-star {
            position: absolute;
            top: 20%;
            right: 15%;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 30px 15px rgba(150,200,255,0.5);
            opacity: 0.4;
        }
        .glow-star2 {
            bottom: 25%;
            left: 10%;
            width: 10px;
            height: 10px;
            position: absolute;
            background: rgba(200,220,255,0.4);
            border-radius: 50%;
            filter: blur(4px);
        }
    </style>
</head>
<body>
    <!-- Декоративные элементы -->
    <div class="glow-star"></div>
    <div class="glow-star2"></div>

    <div class="container">
        <!-- Главная надпись Всё хорошо -->
        <div class="message">Всё хорошо</div>
        
        <!-- Кнопка возврата на главную (опционально) -->
        <a href="index.html" class="back-button">← Вернуться на S1T</a>
    </div>

    <script>
        console.log('✨ Всё хорошо ✨');
    </script>
</body>
</html>
